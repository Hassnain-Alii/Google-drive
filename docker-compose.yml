services:
  mongo:
    image: mongo:7
    container_name: mongo-gdrive
    restart: unless-stopped
    ports: ["27500:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo_data:/data/db
      - ./mongo-seed:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: redis-gdrive
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-ui
    restart: unless-stopped
    ports: ["8081:8081"]
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: dev
      ME_CONFIG_BASICAUTH_PASSWORD: dev

  minio:
    image: minio/minio:latest
    container_name: minio-gdrive
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # app:
  #   build: .
  #   container_name: gdrive-app
  #   restart: unless-stopped
  #   ports:
  #     - "4000:4000"
  #   environment:
  #     - NODE_ENV=production
  #     - DB_URL=mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #     - MINIO_ENDPOINT=http://minio:9000
  #     - MINIO_ACCESS_KEY=${MINIO_USER}
  #     - MINIO_SECRET_KEY=${MINIO_PASS}
  #     - SESSION_SECRET=${SESSION_SECRET}
  #     - JWT_KEY=${JWT_KEY}
  #   depends_on:
  #     - mongo
  #     - redis
  #     - minio

volumes:
  mongo_data:
  redis_data:
  minio_data:
